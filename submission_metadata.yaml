methodology_summary: |
  HybridRank — multi-dimensional scoring that ranks candidates the way a great
  recruiter would. Four dimensions: Technical Fit (30%), Career Quality (35%),
  Behavioral Availability (25%), Logistics (10%).

  Career Quality uses 29 pre-compiled regex patterns on career descriptions to
  find who actually built retrieval/ranking systems, not just who listed skills.
  Five hard disqualifier multipliers handle JD red flags: keyword stuffers (×0.15),
  consulting-only backgrounds (×0.65), ghost candidates (×0.40), etc.

  Runtime: ~90 seconds for 100K candidates on single CPU. No API calls. No network.
  Zero pip dependencies. Fully deterministic.

declarations:
